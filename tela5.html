<!-- ===== ROLADOR DE DADOS ===== -->
<style>
@keyframes dice-pulse {
  0%,100% { box-shadow: 0 0 0px #c9a84c00; }
  50%      { box-shadow: 0 0 12px #c9a84c55; }
}
@keyframes dice-flip {
  0%   { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}
@keyframes panel-in {
  from { opacity:0; transform: translateY(10px) scale(0.97); }
  to   { opacity:1; transform: translateY(0)   scale(1); }
}
@keyframes panel-out {
  from { opacity:1; transform: translateY(0)   scale(1); }
  to   { opacity:0; transform: translateY(10px) scale(0.97); }
}
@keyframes chip-in {
  0%   { transform: scale(0);   opacity:0; }
  70%  { transform: scale(1.15); opacity:1; }
  100% { transform: scale(1);   opacity:1; }
}
@keyframes chip-out {
  from { transform: scale(1); opacity:1; }
  to   { transform: scale(0); opacity:0; }
}
@keyframes roll-pop {
  0%   { transform: translateY(6px); opacity:0; }
  60%  { transform: translateY(-2px); opacity:1; }
  100% { transform: translateY(0);   opacity:1; }
}
@keyframes crit-bang {
  0%   { transform: scale(1);    text-shadow: 0 0 0px #c9a84c00; }
  25%  { transform: scale(1.45); text-shadow: 0 0 18px #c9a84c, 0 0 36px #c9a84c88; }
  55%  { transform: scale(1.15); text-shadow: 0 0 10px #c9a84caa; }
  100% { transform: scale(1);    text-shadow: 0 0 4px #c9a84c55; }
}
@keyframes fail-slump {
  0%   { transform: rotate(0deg);    opacity:1; color:#e0d6c8; }
  40%  { transform: rotate(-18deg);  opacity:0.5; }
  100% { transform: rotate(-22deg);  opacity:0.32; color:#555; }
}
@keyframes shimmer {
  0%   { width:0%; opacity:0.8; }
  100% { width:100%; opacity:0; }
}
#diceBtn { animation: dice-pulse 2.8s ease-in-out infinite; }
#diceBtn.open { animation: none; box-shadow: 0 0 16px #c9a84c55; }
#diceBtn:hover { transform: rotate(12deg) scale(1.08) !important; }
#dicePanel.closing { animation: panel-out 0.18s ease forwards; pointer-events:none; }
</style>

<div id="diceBtn" onclick="toggleDice()" title="Rolar dados"
  style="position:fixed;bottom:24px;left:24px;z-index:950;width:50px;height:50px;background:#13111c;border:1px solid #3a3550;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;">
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="13,1 25,7 25,19 13,25 1,19 1,7" stroke="#c9a84c" stroke-width="1.4" fill="#1a1726"/>
    <polygon points="13,1 25,7 13,10 1,7" stroke="#c9a84c" stroke-width="0.8" fill="#c9a84c18"/>
    <polygon points="1,7 13,10 13,25 1,19" stroke="#c9a84c" stroke-width="0.8" fill="#c9a84c0d"/>
    <polygon points="25,7 13,10 13,25 25,19" stroke="#c9a84c" stroke-width="0.8" fill="#c9a84c22"/>
    <text x="13" y="17" text-anchor="middle" font-size="7" font-family="Georgia,serif" fill="#c9a84c" font-weight="bold">20</text>
  </svg>
</div>

<div id="dicePanel" style="display:none;position:fixed;bottom:86px;left:24px;z-index:950;background:#13111c;border:1px solid #c9a84c44;border-radius:12px;padding:14px;width:268px;box-shadow:0 12px 40px #00000099;overflow:hidden;">
  <!-- linha brilhante no topo -->
  <div id="diceShimmer" style="position:absolute;top:0;left:0;height:1px;background:linear-gradient(90deg,transparent,#c9a84c,transparent);width:0%;pointer-events:none;"></div>
  <!-- header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <button id="diceBtnRolar" onclick="rolarDados()"
      style="background:transparent;border:1px solid #c9a84c66;border-radius:5px;color:#c9a84c;font-family:'Georgia',serif;font-size:0.7rem;letter-spacing:1.5px;padding:4px 12px;cursor:pointer;transition:all 0.2s;"
      onmouseover="this.style.background='#c9a84c22';this.style.boxShadow='0 0 8px #c9a84c44'"
      onmouseout="this.style.background='transparent';this.style.boxShadow='none'">⚄ ROLAR</button>
    <button onclick="limparDados()"
      style="background:transparent;border:1px solid #ff444433;border-radius:5px;color:#ff4444aa;font-family:'Georgia',serif;font-size:0.7rem;padding:4px 10px;cursor:pointer;transition:all 0.2s;"
      onmouseover="this.style.background='#ff444422';this.style.color='#ff4444'"
      onmouseout="this.style.background='transparent';this.style.color='#ff4444aa'">✕</button>
  </div>
  <!-- seletor -->
  <div id="dicePicker" style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;"></div>
  <!-- fila -->
  <div id="diceQueue" style="min-height:26px;display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;"></div>
  <!-- resultado -->
  <div id="diceResult" style="display:none;border-top:1px solid #2a2535;padding-top:10px;">
    <div id="diceRolls" style="font-size:0.78rem;color:#aaa;line-height:2;word-break:break-all;"></div>
    <div id="diceSum" style="font-size:1.15rem;color:#c9a84c;font-weight:bold;margin-top:6px;letter-spacing:1px;"></div>
  </div>
</div>

<script>
  const DADOS = [2,4,6,8,10,12,20,100];
  let _diceOpen = false;
  let _diceQueue = [];

  (function() {
    const p = document.getElementById('dicePicker');
    DADOS.forEach(d => {
      const b = document.createElement('button');
      b.textContent = 'd' + d;
      b.style.cssText = 'background:#1a1726;border:1px solid #3a3550;border-radius:5px;color:#888;font-family:Georgia,serif;font-size:0.7rem;padding:4px 8px;cursor:pointer;transition:all 0.18s;';
      b.onmouseover = () => { b.style.borderColor='#c9a84c'; b.style.color='#c9a84c'; b.style.background='#c9a84c11'; };
      b.onmouseout  = () => { b.style.borderColor='#3a3550'; b.style.color='#888'; b.style.background='#1a1726'; };
      b.onclick = () => { adicionarDado(d); b.style.transform='scale(0.88)'; setTimeout(()=>b.style.transform='',120); };
      p.appendChild(b);
    });
  })();

  function toggleDice() {
    const panel = document.getElementById('dicePanel');
    const btn   = document.getElementById('diceBtn');
    if (_diceOpen) {
      panel.classList.add('closing');
      btn.classList.remove('open');
      setTimeout(() => { panel.style.display='none'; panel.classList.remove('closing'); }, 180);
    } else {
      panel.style.display = 'block';
      panel.style.animation = 'panel-in 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards';
      btn.classList.add('open');
      btn.style.animation = 'dice-flip 0.45s ease';
      setTimeout(() => { btn.style.animation = 'none'; btn.style.boxShadow = '0 0 16px #c9a84c55'; }, 460);
      _doShimmer();
    }
    _diceOpen = !_diceOpen;
  }

  function _doShimmer() {
    const s = document.getElementById('diceShimmer');
    s.style.transition = 'none'; s.style.width = '0%'; s.style.opacity = '0.9';
    requestAnimationFrame(() => {
      s.style.transition = 'width 0.5s ease, opacity 0.5s ease';
      s.style.width = '100%'; s.style.opacity = '0';
    });
  }

  function adicionarDado(d) {
    _diceQueue.push(d);
    renderQueue(true);
  }

  function removerDado(i) {
    const chips = document.getElementById('diceQueue').children;
    const chip  = chips[i];
    if (chip) {
      chip.style.animation = 'chip-out 0.15s ease forwards';
      setTimeout(() => { _diceQueue.splice(i,1); renderQueue(false); }, 140);
    }
  }

  function limparDados() {
    _diceQueue = [];
    renderQueue(false);
    const r = document.getElementById('diceResult');
    r.style.transition = 'opacity 0.2s';
    r.style.opacity = '0';
    setTimeout(() => { r.style.display='none'; r.style.opacity='1'; r.style.transition=''; }, 200);
  }

  function renderQueue(animate) {
    const el = document.getElementById('diceQueue');
    el.innerHTML = '';
    _diceQueue.forEach((d, i) => {
      const chip = document.createElement('span');
      chip.textContent = 'd' + d;
      chip.title = 'Clique para remover';
      chip.style.cssText = 'background:#1a1726;border:1px solid #c9a84c55;border-radius:5px;color:#c9a84c;font-size:0.7rem;padding:3px 8px;cursor:pointer;display:inline-block;transition:border-color 0.15s,color 0.15s;';
      if (animate && i === _diceQueue.length - 1)
        chip.style.animation = 'chip-in 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards';
      chip.onmouseover = () => { chip.style.borderColor='#ff4444'; chip.style.color='#ff4444'; chip.style.textDecoration='line-through'; };
      chip.onmouseout  = () => { chip.style.borderColor='#c9a84c55'; chip.style.color='#c9a84c'; chip.style.textDecoration=''; };
      chip.onclick = () => removerDado(i);
      el.appendChild(chip);
    });
  }

  function rolarDados() {
    if (!_diceQueue.length) return;
    const resultados = _diceQueue.map(d => ({ d, v: Math.floor(Math.random() * d) + 1 }));
    const soma = resultados.reduce((s, r) => s + r.v, 0);
    const rollsEl = document.getElementById('diceRolls');
    const sumEl   = document.getElementById('diceSum');
    const resEl   = document.getElementById('diceResult');
    rollsEl.innerHTML = '';
    resEl.style.display = 'block';
    sumEl.textContent = '';
    // aparece cada resultado com stagger
    resultados.forEach((r, i) => {
      const span = document.createElement('span');
      span.style.cssText = 'display:inline-block;margin-right:10px;opacity:0;animation:roll-pop 0.25s ease forwards;';
      span.style.animationDelay = (i * 80) + 'ms';
      const isCrit = r.v === r.d;
      const isFail = r.v === 1;
      const numStyle = isCrit
        ? 'font-weight:bold;font-size:0.9rem;color:#c9a84c;display:inline-block;'
        : isFail
        ? 'font-weight:bold;font-size:0.9rem;color:#555;display:inline-block;'
        : 'font-weight:bold;font-size:0.9rem;color:#c9a84c;display:inline-block;';
      span.innerHTML = `<span style="color:#555;font-size:0.68rem;">d${r.d}</span> <span class="_dnum" style="${numStyle}">${r.v}</span>`;
      rollsEl.appendChild(span);
      if (isCrit || isFail) {
        const anim = isCrit ? 'crit-bang' : 'fail-slump';
        const dur  = isCrit ? '0.55s' : '0.5s';
        const fill = isCrit ? 'forwards' : 'forwards';
        setTimeout(() => {
          const numEl = span.querySelector('._dnum');
          if (numEl) numEl.style.animation = `${anim} ${dur} ease ${fill}`;
        }, i * 80 + 260);
      }
    });
    // contador animado na soma
    const delay = resultados.length * 80 + 120;
    setTimeout(() => _animarSoma(sumEl, soma), delay);
    _doShimmer();
  }

  function _animarSoma(el, alvo) {
    let cur = 0;
    const step = Math.max(1, Math.floor(alvo / 18));
    const iv = setInterval(() => {
      cur = Math.min(cur + step, alvo);
      el.textContent = '= ' + cur;
      if (cur >= alvo) clearInterval(iv);
    }, 28);
  }
</script>

<script src="estado.js"></script>
<script src="audio.js"></script>

<script>
  const logoImg = document.querySelector('#navLogo img');
  logoImg.classList.add('logo-entrada');
  logoImg.addEventListener('animationend', () => {
    logoImg.classList.remove('logo-entrada');
    logoImg.classList.remove('logo-girar');
  });

  function toggleMenu() {
    Sons.toggle();
    logoImg.classList.remove('logo-girar');
    void logoImg.offsetWidth;
    logoImg.classList.add('logo-girar');
    document.getElementById('navMenu').classList.toggle('aberto');
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('navLogo').contains(e.target))
      document.getElementById('navMenu').classList.remove('aberto');
  });

  function sair() {
    sessionStorage.removeItem('primordios_logado');
    window.location.href = 'tela0.html';
  }

  function novoPersonagem() {
    Object.assign(estado, {
      personagem: null, classe: null, nivel: 1, caminho: null,
      constancias: { Vigor: 0, Destreza: 0, Sabedoria: 0, 'Intelig\u00eancia': 0, 'For\u00e7a': 0, Carisma: 0 },
      constanciasEscolhidas: [], arma: null, armadura: null, acessorio: null, talentos: [], nomePersonagem: ''
    });
    salvarEstado();
    window.location.href = 'tela1.html';
  }

  window.addEventListener('load', () => {
    carregarEstadoBase();
    renderFicha();
    salvarPersonagem();
  });

  function salvarPersonagem() {
    const user = JSON.parse(sessionStorage.getItem('primordios_logado') || 'null');
    if (!user) return;
    if (!estado.nomePersonagem || !estado.classe) return;
    const lista = JSON.parse(localStorage.getItem('primordios_personagens_' + user.usuario) || '[]');
    const foto  = sessionStorage.getItem('fragmentados_foto') || '';
    const desc  = sessionStorage.getItem('fragmentados_desc') || '';
    const novo  = {
      nomePersonagem: estado.nomePersonagem,
      classe:         estado.classe,
      nivel:          estado.nivel,
      foto, desc,
      pvMax: sessionStorage.getItem('fragmentados_pvmax'),
      peMax: sessionStorage.getItem('fragmentados_pemax'),
      pv:    sessionStorage.getItem('fragmentados_pv'),
      pe:    sessionStorage.getItem('fragmentados_pe'),
      ca:    sessionStorage.getItem('fragmentados_ca'),
      xp:    sessionStorage.getItem('fragmentados_xp'),
      estadoCompleto: { ...estado }
    };
    const existente = lista.findIndex(p => p.nomePersonagem === novo.nomePersonagem);
    if (existente !== -1) lista[existente] = novo;
    else lista.push(novo);
    localStorage.setItem('primordios_personagens_' + user.usuario, JSON.stringify(lista));
  }
</script>
